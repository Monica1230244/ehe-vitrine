<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact | EHE</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="inner-page">
    <header class="simple-header">
      <a class="brand" href="./index.html"><span class="brand-mark">EHE</span></a>
      <nav class="simple-nav"><a href="./index.html">Accueil</a><a href="./histoire.html">Notre histoire</a><a href="./faq.html">FAQ</a></nav>
    </header>
    <main class="content-page">
      <p class="eyebrow">Contact</p>
      <h1>Parler a EHE</h1>
      <p>Pour une commande, une question de pointure ou une fabrication sur commande, envoyez-nous un message.</p>
      <form class="contact-form page-contact-form" data-contact-form>
        <input name="name" type="text" placeholder="Votre nom" required>
        <input name="phone" type="tel" placeholder="Telephone">
        <input name="email" type="email" placeholder="Email">
        <input name="subject" type="text" placeholder="Sujet">
        <textarea name="message" placeholder="Votre message" required></textarea>
        <button class="btn btn-primary" type="submit">Envoyer</button>
      </form>
      <div class="toast" data-toast>Message envoye</div>
    </main>
    <script src="./contact.js"></script>
  </body>
</html>
