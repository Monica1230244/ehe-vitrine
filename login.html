<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion admin EHE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./admin.css">
  </head>
  <body class="login-page">
    <main class="login-shell">
      <a class="brand" href="./index.html">EHE</a>
      <p class="eyebrow">Administration</p>
      <h1>Connexion</h1>
      <form class="login-form" data-login-form>
        <label>
          Email
          <input name="email" type="email" value="admin@ehe.local" autocomplete="username" required>
        </label>
        <label>
          Mot de passe
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="btn primary" type="submit">Se connecter</button>
        <p class="form-message" data-login-message></p>
      </form>
      <a class="login-back" href="./index.html">Retour a la vitrine</a>
    </main>
    <script src="./login.js"></script>
  </body>
</html>
